<div class="page page--narrow">
  <div class="form-parchment fade-in-up">
    <div class="auth-header text-center">
      <span class="auth-header__seal">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--wood-400)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <circle cx="12" cy="16" r="1"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </span>
      <h1 class="font-scroll auth-header__title">Bentornato</h1>
      <p class="text-secondary">Risolvi enigmi, scala la classifica.</p>
    </div>

    <form (ngSubmit)="onSubmit()" #f="ngForm" class="auth-form">
      @if (error()) {
        <div class="alert alert--error scale-in">
          {{ error() }}
        </div>
      }

      <div class="field">
        <label class="label" for="username">Username</label>
        <input
          id="username"
          type="text"
          class="input"
          placeholder="IlTuoUsername"
          [(ngModel)]="username"
          name="username"
          required
          autocomplete="username"
        />
      </div>

      <div class="field field--lg">
        <label class="label" for="password">Password</label>
        <div class="input-wrapper">
          <input
            id="password"
            [type]="showPassword() ? 'text' : 'password'"
            class="input input--password"
            placeholder="••••••••"
            [(ngModel)]="password"
            name="password"
            required
            autocomplete="current-password"
          />
          <button
            type="button"
            class="password-toggle"
            (click)="showPassword.set(!showPassword())"
            [attr.aria-label]="showPassword() ? 'Nascondi password' : 'Mostra password'"
          >
            @if (showPassword()) {
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            } @else {
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            }
          </button>
        </div>
      </div>

      <button
        type="submit"
        class="btn btn--primary btn--lg w-full"
        [disabled]="loading() || !username() || !password()"
      >
        @if (loading()) {
          <span class="spinner spinner--small"></span>
          Accesso in corso...
        } @else {
          Accedi
        }
      </button>
    </form>

    <p class="text-sm text-center auth-footer">
      Non hai un account?
      <a routerLink="/signup">Registrati</a>
    </p>
  </div>
</div>
